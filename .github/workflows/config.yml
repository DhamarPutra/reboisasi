name: auto commit

on:
  push:
    branches: main
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js
      uses: actions/setup-node@v1
      with:
        node-version: '14.x'
    - name: Install Node-Fetch
      run: npm install
    - name: Update README.md
      run: node index.js > README.md
    - name: Commit change & Push
      run: |
          git config user.name 'DhamarPutra'
          git config user.email 'damarputra0191@gmail.com'
          git remote set-url origin https://DhamarPutra:${{ secrets.autocommit }}@github.com/DhamarPutra/reforestation.git
      env:
          GITHUB_TOKEN: ${{ secrets.autocommit }}
    - name: Auto GIT
      run: |
          git status
          git add .
          git commit -am "Jangan Lupa Follow https://www.instagram.com/damarp_p"
          git push
      env:
          GITHUB_TOKEN: ${{ secrets.token_gh }}
